<app-auth-template [title]="'Register'" [title_icon]="'app_registration'">
    <form [formGroup]="registerForm" (ngSubmit)="register()">
        <div class="input-wrapper">
            <mat-form-field appearance="outline">
                <mat-label>Name</mat-label>
                <input matInput [formControlName]="'name'" required autofocus />
                <mat-error *ngIf="registerForm.get('name')?.invalid">Name can not be empty</mat-error>
            </mat-form-field>
        </div>

        <div class="input-wrapper">
            <mat-form-field appearance="outline">
                <mat-label>Username</mat-label>
                <input matInput [formControlName]="'username'" required autofocus />
                <mat-error *ngIf="registerForm.get('username')?.invalid">Username can not be empty</mat-error>
            </mat-form-field>
        </div>

        <div class="input-wrapper">
            <mat-form-field appearance="outline">
                <mat-label>Email</mat-label>
                <input matInput [formControlName]="'email'" required autofocus />
                <mat-error *ngIf="registerForm.get('email')?.invalid">Provide a valid email</mat-error>
            </mat-form-field>
        </div>
        <div class="input-wrapper">
            <mat-form-field appearance="outline">
                <mat-label>Password</mat-label>
                <input matInput [type]="passwordHide ? 'password' : 'text'" required />
                <button mat-icon-button matSuffix (click)="passwordHide = !passwordHide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="passwordHide">
                    <mat-icon>{{
                        passwordHide ? "visibility_off" : "visibility"
                        }}</mat-icon>
                </button>
                <mat-error *ngIf="registerForm.get('password')?.invalid">Password cannot be empty</mat-error>
            </mat-form-field>
        </div>
        <div class="input-wrapper">
            <button class="right-align" mat-flat-button color="primary" type="submit" color="accent">
                Register
            </button>
        </div>
        <app-bottom-links [selection]="'login'"></app-bottom-links>
        <app-bottom-links [selection]="'password'"></app-bottom-links>
    </form>

</app-auth-template>
