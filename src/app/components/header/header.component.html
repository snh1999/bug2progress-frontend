<mat-toolbar color="primary" class="navbar">

  <span>
    <app-logo />
  </span>
  <span>
    <button mat-icon-button (click)="toggleTheme()">
      <mat-icon>{{ isDarkTheme ? "brightness_5" : "brightness_2" }}</mat-icon>
    </button>
    <button mat-icon-button>
      <mat-icon aria-hidden="false" fontIcon="person" />
    </button>
    <button mat-icon-button>
      <mat-icon aria-hidden="false" fontIcon="logout" />
    </button>
  </span>
</mat-toolbar>
